version: '3.8'

# ============================================================
# MediBook — WhatsApp Gateway (whatsapp-web.js)
#
# Usage:
#   1. Run:  docker compose -f docker-compose.openwa.yml up -d --build
#   2. Open: http://localhost:2785/api/qr  →  scan QR code
#   3. Test: http://localhost:2785/api/health
# ============================================================

services:
  whatsapp:
    build: ./whatsapp-gateway
    container_name: medibook-whatsapp
    restart: unless-stopped
    ports:
      - "2785:2785"
    environment:
      PORT: 2785
      WA_API_KEY: ${OPENWA_API_KEY:-medibook2025secure}
    volumes:
      - whatsapp_session:/usr/src/app/session
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2785/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whatsapp_session:
    name: medibook_whatsapp_session
